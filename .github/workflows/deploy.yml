name: Deploy CoffeeQuant to App Engine

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: coffeequant

      - name: Show ignore + files-to-upload
        run: |
          echo "=== .gcloudignore ==="
          (test -f .gcloudignore && cat .gcloudignore) || echo "NO .gcloudignore"
          echo ""
          echo "=== files gcloud will upload (first 200) ==="
          gcloud meta list-files-for-upload --directory . | head -n 200

      - name: Deploy (no promote)
        run: |
          VERSION="gha-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"
          gcloud app deploy app.yaml --quiet --no-promote --version "$VERSION"

      - name: Smoke test new version (wait + retry)
        run: |
          BASE="https://${VERSION}-dot-coffeequant.appspot.com"
          echo "Testing version URL: $BASE"

          # Wait until App Engine reports SERVING (can lag)
          for i in {1..30}; do
            STATUS=$(gcloud app versions describe "${VERSION}" --service=default --format="value(servingStatus)" 2>/dev/null || echo "")
            echo "servingStatus: ${STATUS:-<none>} (try $i/30)"
            if [ "$STATUS" = "SERVING" ]; then
              break
            fi
            sleep 5
          done

          # Retry healthz (cold start + route propagation)
          for i in {1..30}; do
            echo "curl try $i/30 -> $BASE/healthz"
            if curl -fsS "$BASE/healthz" >/dev/null ; then
              echo "✅ /healthz OK"
              break
            fi
            sleep 4
          done

          # Also verify home page is up
          for i in {1..30}; do
            echo "curl try $i/30 -> $BASE/"
            if curl -fsS "$BASE/" >/dev/null ; then
              echo "✅ / OK"
              exit 0
            fi
            sleep 4
          done

          echo "❌ Smoke test failed after retries"
          echo "Last check (headers):"
          curl -I "$BASE/healthz" || true
          curl -I "$BASE/" || true
          exit 1

      - name: Promote traffic
        run: |
          echo "Promoting version: $VERSION"
          gcloud app services set-traffic default --splits ${VERSION}=1 --quiet
